# Hermes Agent — Secret tier config.
#
# Routes through SecretAI's rytn endpoint (OpenAI-compatible) so all
# inference stays inside attested compute. The SecretAI API key lives
# in .env (not in this file). Renderer substitutes the VM hostname
# placeholder at render time.

model:
  # Custom provider = any OpenAI-compatible /v1 endpoint. SecretAI
  # rytn exposes a /v1/chat/completions endpoint; the renderer
  # substitutes __MODEL__ with the user's selection (default
  # gemma4:31b, which is the only model verified for structured
  # tool_calls; qwq:32b and qwen3-vl:32b are exposed as experimental
  # alternatives in the wizard).
  provider: "custom"
  default: "__MODEL__"
  base_url: "https://secretai-rytn.scrtlabs.com:21434/v1"
  # rytn models advertise 262144 tokens; Hermes will trim as needed.
  context_length: 262144

gateway:
  # Dashboard binds to localhost; Traefik in front handles TLS + Host
  # routing. Allowed origins includes the assigned VM hostname so the
  # browser-side dashboard JS can connect via WebSocket.
  controlUi:
    allowedOrigins:
      - "http://localhost:9119"
      - "http://127.0.0.1:9119"
      - "https://__VM_HOSTNAME__"
    # Hermes equivalent of OpenClaw's dangerouslyDisableDeviceAuth —
    # for single-user attested VMs the gateway token is the sole auth
    # boundary; per-browser pairing is unnecessary friction. Verify
    # this is the correct Hermes field name during Phase D VM testing.
    dangerouslyDisableDeviceAuth: true
  platforms:
    telegram:
      enabled: true

# Pre-grant exec scope — non-Claude / SecretAI models in particular
# would otherwise prompt per-call, which our headless cron flow can't
# answer. Same posture as OpenClaw Secret-tier.
tools:
  exec:
    security: "full"
    ask: "off"

# Agent persona / workspace files load from $HERMES_HOME by default:
# SOUL.md, AGENTS.md, USER.md — same names as OpenClaw's workspace.
